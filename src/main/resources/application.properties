quarkus.http.port=8081

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=true

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.smallrye-openapi.info-title=AniPoll Management API
quarkus.smallrye-openapi.info-version=1.0.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=CRUD API for anime and sharacter management with PostgreSQL write model and Elasticsearch read model.
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger

# Dev/Test: let Quarkus Dev Services provision PostgreSQL and Elasticsearch automatically.
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.elasticsearch.devservices.enabled=true
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.elasticsearch.devservices.enabled=true

# Production / explicit runtime config
%prod.quarkus.datasource.reactive.url=${ANIPOLL_DB_REACTIVE_URL:postgresql://localhost:5432/anipoll_management}
%prod.quarkus.datasource.jdbc.url=${ANIPOLL_DB_JDBC_URL:jdbc:postgresql://localhost:5432/anipoll_management}
%prod.quarkus.datasource.username=${ANIPOLL_DB_USERNAME:postgres}
%prod.quarkus.datasource.password=${ANIPOLL_DB_PASSWORD:postgres}
%prod.quarkus.elasticsearch.hosts=${ANIPOLL_ELASTICSEARCH_HOSTS:management-elasticsearch:9200}
