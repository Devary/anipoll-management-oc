version: '3.9'

services:
  management-db:
    image: postgres:16
    container_name: anipoll-management-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anipoll_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - management-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-anipoll_management}']
      interval: 10s
      timeout: 5s
      retries: 10

  management-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.3}
    container_name: anipoll-management-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: ${ELASTIC_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - '${ELASTIC_PORT:-9200}:9200'
    volumes:
      - management-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200 >/dev/null || exit 1']
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  management-kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.17.3}
    container_name: anipoll-management-kibana
    depends_on:
      management-elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://management-elasticsearch:9200
    ports:
      - '${KIBANA_PORT:-5601}:5601'
    restart: unless-stopped

  management-service:
    build:
      context: ..
      dockerfile: management/src/main/docker/Dockerfile.jvm
    container_name: anipoll-management-service
    depends_on:
      management-db:
        condition: service_healthy
      management-elasticsearch:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: prod
      ANIPOLL_DB_REACTIVE_URL: postgresql://management-db:5432/${POSTGRES_DB:-anipoll_management}
      ANIPOLL_DB_JDBC_URL: jdbc:postgresql://management-db:5432/${POSTGRES_DB:-anipoll_management}
      ANIPOLL_DB_USERNAME: ${POSTGRES_USER:-postgres}
      ANIPOLL_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ANIPOLL_ELASTICSEARCH_HOSTS: management-elasticsearch:9200
    ports:
      - '${MANAGEMENT_PORT:-8081}:8081'
    restart: unless-stopped

volumes:
  management-postgres-data:
  management-elasticsearch-data:
